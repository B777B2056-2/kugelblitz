version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - nilerr
    - revive
    - staticcheck
    - unconvert
    - unused

  settings:
    staticcheck:
      checks:
        - all
        - -ST1000  # package comment style

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: unnecessary-stmt
        - name: unreachable-code

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
