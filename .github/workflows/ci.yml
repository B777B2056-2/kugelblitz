name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: golangci-lint (root)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.0
          working-directory: .

      - name: golangci-lint (cmd/common)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.0
          working-directory: cmd/common

      - name: golangci-lint (cmd/kugelblitz-ui)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.0
          working-directory: cmd/kugelblitz-ui

      - name: golangci-lint (cmd/acp_server)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.0
          working-directory: cmd/acp_server

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test (root)
        run: go test ./... -count=1 -timeout 120s

      - name: Test (cmd/common)
        run: cd cmd/common && go test ./... -count=1 -timeout 120s

      - name: Test (cmd/kugelblitz-ui)
        run: cd cmd/kugelblitz-ui && go test ./... -count=1 -timeout 120s

      - name: Test (cmd/acp_server)
        run: cd cmd/acp_server && go test ./... -count=1 -timeout 120s
